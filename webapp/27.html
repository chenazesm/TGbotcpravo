<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Premium Gift</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-bg: #1c1c1d;
            --tg-text: #ffffff;
            --tg-hint: #8e8e93;
            --tg-blue: #3390ec;
            --tg-input: #2c2c2e;
            --sf-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--sf-font);
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header-icon {
            margin-top: 50px;
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            text-align: center;
        }

        .subtitle {
            font-size: 15px;
            color: var(--tg-hint);
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
            margin-bottom: 30px;
        }
        .login-form {
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            background-color: var(--tg-input);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--tg-blue);
        }

        .country-code {
            font-size: 16px;
            font-weight: 500;
            margin-right: 10px;
            padding-right: 10px;
            border-right: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="tel"] {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            font-family: var(--sf-font);
            outline: none;
            width: 100%;
        }

        input[type="tel"]::placeholder {
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--sf-font);
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background-color: var(--tg-blue);
            color: white;
        }

        .btn-primary:active {
            opacity: 0.8;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ff453a; /* Красный цвет iOS */
            margin-top: 5px;
        }

        .fake-footer {
            margin-top: auto;
            margin-bottom: 20px;
            font-size: 12px;
            color: #555;
            text-align: center;
        }

        .fake-url {
            color: #777;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header-icon">🎁</div>
    
    <h1>Telegram Premium</h1>
    <div class="subtitle">
        Анонимный пользователь подарил вам подписку на 6 месяцев. Авторизуйтесь, чтобы привязать её к аккаунту.
    </div>

    <div class="login-form">
        <div class="input-group">
            <div class="country-code">
                <span>🇧🇾</span> +375
            </div>
            <input type="tel" placeholder="29 123 45 67" autocomplete="off">
        </div>

        <button class="btn btn-primary" onclick="sendResult(false)">
            Получить подарок
        </button>
        
        <button class="btn btn-secondary" onclick="sendResult(true)">
            Закрыть
        </button>
    </div>

    <div class="fake-footer">
        <div class="fake-url">🔒 telegram_freegift.ru</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#1c1c1d'); 

        async function sendResult(isWin) {
            const chat_id = tg.initDataUnsafe?.user?.id;

            if (!chat_id) {
                alert("Ошибка: Запустите через бота!");
                return;
            }

            try {
                const response = await fetch('/api/submit_answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chat_id,
                        is_win: isWin
                    })
                });

                if (response.ok) {
                    tg.close();
                }
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
